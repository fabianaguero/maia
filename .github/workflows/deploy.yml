name: Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: maia
          directory: site/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Build complete (manual Cloudflare Pages connect required)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' }}
        run: |
          echo "✅ Site built successfully"
          echo "⚠️  Cloudflare Pages deployment requires:"
          echo "   1. Set CLOUDFLARE_API_TOKEN secret in GitHub repo settings"
          echo "   2. Set CLOUDFLARE_ACCOUNT_ID secret in GitHub repo settings"
          echo "   3. Or: Connect repo directly to Cloudflare Pages dashboard"
          echo "   📖 https://developers.cloudflare.com/pages/get-started/git-integration/"
