name: Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Verify build output
        working-directory: site
        run: |
          test -f dist/index.html && echo "✅ Build successful: dist/index.html exists" || exit 1
          test -d dist/assets && echo "✅ Assets directory exists" || exit 1

      - name: Info
        run: |
          echo "🚀 Site is ready for deployment"
          echo "📝 To deploy to Cloudflare Pages:"
          echo "   1. Connect this repo to your Cloudflare Pages project"
          echo "   2. Set build command: npm install && npm run build"
          echo "   3. Set build output directory: site/dist"
          echo "   4. Configure custom domain: maiaflow.app"
          echo "   📖 https://developers.cloudflare.com/pages/get-started/git-integration/"
